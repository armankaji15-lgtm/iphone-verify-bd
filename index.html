<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone Verify BD</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>📱 iPhone Verify BD</h1>

<p>যেকোনো iPhone কেনার আগে সম্পূর্ণ যাচাই করুন</p>

</header>

<div class="container">

<h2>📋 iPhone Verify Form</h2>

<form id="verifyForm">

</form>

</div>

<script src="app.js"></script>

</body>
</html>
<!-- 🔋 Battery -->
<h3>🔋 Battery</h3>

<label>১. ব্যাটারি হেলথ কত %?</label>
<input type="number" placeholder="যেমন: 89">

<label>২. 3uTools-এ কখনো চেক করা হয়েছে? Battery Condition কেমন? চার্জ ব্যাকআপ কেমন পান?</label>
<textarea rows="3" placeholder="এখানে লিখুন..."></textarea>

<hr>

<!-- 📦 ফোনের তথ্য -->
<h3>📦 ফোনের তথ্য</h3>

<label>৩. ব্যাটারি টি মার্কেট এর নাকি মোবাইল সাথের?</label>

<input type="radio" name="battery" value="Original"> মোবাইল সাথের
<br>
<input type="radio" name="battery" value="Market"> মার্কেট

<br><br>

<label>৪. ফোনের সাথে কী কী পাবো? (বক্স, চার্জার, কেবল, কভার ইত্যাদি)</label>

<textarea rows="3" placeholder="এখানে লিখুন..."></textarea>

<label>৫. IMEI কি বক্সের সঙ্গে মিল আছে?</label>

<input type="radio" name="imei" value="Yes"> ✅ Yes
<input type="radio" name="imei" value="No"> ❌ No

<hr>

<!-- 🔐 Security -->

<h3>🔐 Security</h3>

<label>৬. Face ID ঠিকমতো কাজ করে? কোনো সমস্যা থাকলে ডিভাইসে Boost Face ID বা অন্য কোনো পরিবর্তন করা হয়েছে কি?</label>

<input type="radio" name="faceid" value="Yes"> ✅ Yes
<input type="radio" name="faceid" value="No"> ❌ No

<br><br>

<label>৭. iCloud Lock / Activation Lock সম্পূর্ণ মুক্ত?</label>

<input type="radio" name="icloud" value="Yes"> ✅ Yes
<input type="radio" name="icloud" value="No"> ❌ No

<br><br>

<label>৮. ফোন Factory Reset করে নতুন Apple ID দিয়ে Login করে দেখাতে পারবেন?</label>

<input type="radio" name="reset" value="Yes"> ✅ Yes
<input type="radio" name="reset" value="No"> ❌ No

<hr>
